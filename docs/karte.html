<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karte – Adressbuch Essen 1936</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    body { overflow: hidden; }
  </style>
</head>
<body>

<nav>
  <span class="logo">Adressbuch Essen 1936</span>
  <button class="nav-toggle" aria-label="Menü">☰</button>
  <div class="nav-links">
    <a href="index.html">Start</a>
    <div class="nav-dropdown">
      <a href="#" class="nav-dropdown-trigger active">Karte ▾</a>
      <div class="nav-dropdown-menu">
        <a href="karte.html" class="active">Interaktive Karte</a>
        <a href="schichtenkarte.html">– Einkommensverteilung</a>
      </div>
    </div>
    <a href="statistik.html">Statistik</a>
    <a href="gewerbe.html">GewerbeMaps1936</a>
    <div class="nav-dropdown">
      <a href="#" class="nav-dropdown-trigger">Datenbank ▾</a>
      <div class="nav-dropdown-menu">
        <a href="firmen.html">Gewerbeverzeichnis</a>
        <a href="einwohner.html">Einwohnerverzeichnis</a>
      </div>
    </div>
  </div>
</nav>

<div id="loading">
  <div class="spinner"></div>
  <span>Kartendaten werden geladen …</span>
</div>

<div class="map-layout">
  <div id="sidebar">

    <!-- Suchbereich (fixiert, kein Scroll) -->
    <div id="sidebar-search">
      <div id="search-box-wrap">
        <svg id="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/>
        </svg>
        <input type="text" id="search-input"
               placeholder="Person, Gewerbe oder Straße …"
               autocomplete="off" spellcheck="false" aria-label="Suche">
        <button id="search-clear" aria-label="Suche löschen" style="display:none">✕</button>
      </div>
      <div id="search-dropdown" role="listbox" aria-label="Suchergebnisse"></div>
    </div>

    <!-- Ergebnisliste (bei aktiver Suche) -->
    <div id="sidebar-results">
      <div id="results-header">
        <button id="btn-back-filter">← Filter</button>
        <span id="results-count"></span>
      </div>
      <div id="results-jumps"></div>
      <div id="results-list"></div>
    </div>

    <!-- Filter (scrollbar) -->
    <div id="sidebar-filters">
      <h2>Filter</h2>

      <div class="filter-section">
        <label>Kategorie</label>
        <div class="checkbox-row">
          <input type="checkbox" id="kat-I" checked>
          <label for="kat-I">Einwohner (I)</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="kat-III" checked>
          <label for="kat-III">Gewerbe (III)</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="kat-II">
          <label for="kat-II">Straßenverz. (II) <span class="hint">Duplikate</span></label>
        </div>
      </div>

      <div class="filter-section">
        <label for="filter-stadtteil">Stadtteil</label>
        <select id="filter-stadtteil" multiple>
          <!-- Dynamisch befüllt -->
        </select>
      </div>

      <div class="filter-section">
        <label>Bergbau</label>
        <div class="checkbox-row">
          <input type="checkbox" id="filter-bergbau-narrow">
          <label for="filter-bergbau-narrow">Bergmänner & Steiger</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="filter-bergbau-broad">
          <label for="filter-bergbau-broad">Alle Bergbauberufe</label>
        </div>
      </div>

      <div class="filter-section">
        <div class="checkbox-row">
          <input type="checkbox" id="filter-akademiker">
          <label for="filter-akademiker">Nur Akademiker (Dr., Prof., Dipl.)</label>
        </div>
      </div>

      <div class="filter-section">
        <label>Berufsgruppe <span class="hint">(mehrere wählbar)</span>
          <span class="info-btn" tabindex="0">ⓘ
            <span class="info-tooltip">
              Kategorien der <strong>OhdAB-Ontologie</strong> historischer Berufsbezeichnungen:<br><br>
              B 0: Militär<br>
              B 1: Land-, Forst- und Tierwirtschaft und Gartenbau<br>
              B 2: Rohstoffgewinnung, Produktion und Fertigung<br>
              B 3: Bau, Architektur, Vermessung und Gebäudetechnik<br>
              B 4: Naturwissenschaft, Geografie und Informatik<br>
              B 5: Verkehr, Logistik, Schutz und Sicherheit<br>
              B 6: Kaufmännische Dienstleistungen, Warenhandel, Vertrieb, Hotel und Tourismus<br>
              B 7: Unternehmensorganisation, Buchhaltung, Recht und Verwaltung<br>
              B 8: Gesundheit, Soziales, Lehre und Erziehung<br>
              B 9: Sprach-, Literatur-, Geistes-, Gesellschafts- und Wirtschaftswissenschaften, Medien, Kunst, Kultur und Gestaltung
            </span>
          </span>
        </label>
        <div id="filter-berufsgruppen"></div>
      </div>

      <button id="btn-reset">Filter zurücksetzen</button>

      <div class="filter-section layer-toggle-section">
        <label>Hintergrundkarte</label>
        <div class="checkbox-row">
          <input type="checkbox" id="toggle-stadtplan" checked>
          <label for="toggle-stadtplan">Stadtplan Essen 1935</label>
        </div>
        <div class="opacity-row" id="opacity-row">
          <label for="opacity-stadtplan">Deckkraft</label>
          <input type="range" id="opacity-stadtplan" min="0" max="100" value="70">
          <span id="opacity-value">70%</span>
        </div>
      </div>

    </div>

  </div>

  <div id="map"></div>

  <div id="legend">
    <h4>Personen je Adresse</h4>
    <div class="legend-row"><div class="legend-dot" style="background:#1d4ed8;opacity:0.5"></div> 1</div>
    <div class="legend-row"><div class="legend-dot" style="background:#1d4ed8;opacity:0.65"></div> 2–5</div>
    <div class="legend-row"><div class="legend-dot" style="background:#1d4ed8;opacity:0.8"></div> 6–20</div>
    <div class="legend-row"><div class="legend-dot" style="background:#1d4ed8;opacity:0.97"></div> &gt; 20</div>
    <div class="legend-row"><div class="legend-dot" style="background:#d97706;opacity:0.7"></div> Gewerbe (III)</div>
    <div class="legend-row" id="legend-zeche" style="display:none">
      <img src="img/schlaegel-eisen.png" alt="Zeche" style="width:16px;height:16px;flex-shrink:0"> Zeche (aktiv 1936)
    </div>
  </div>
</div>

<script>document.querySelector('.nav-toggle')?.addEventListener('click',function(){document.querySelector('.nav-links')?.classList.toggle('open')});</script>
<script src="js/karte.js"></script>
</body>
</html>
